<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Click Me</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    img {
      max-width: 100%;
      height: auto;
      cursor: pointer;
      display: block;
    }
  </style>
</head>

<body>

  <!-- 🔊 Soundbite -->
  <audio id="sound" src="ezekiel-25-17_pulpfiction.mp3"></audio>

  <!-- Clickable image -->
  <img id="clickImage" src="Click_I_Dare.jpg" alt="Click on me, I dare you">

  <script>
    const audio = document.getElementById("sound");
    const img = document.getElementById("clickImage");
    let hasPlayed = false;

    img.addEventListener("click", () => {
      if (!hasPlayed) {
        hasPlayed = true;

        // Play the sound
        audio.volume = 1.0;
        audio.play().catch(() => {
          // If autoplay is blocked, play on next click
          audio.play();
        });

        // When the sound finishes, redirect to Discord
        audio.onended = () => {
          window.location.href = "https://discord.gg/grkAwQ9W";
        };

      }
    });
  </script>

</body>
</html>
