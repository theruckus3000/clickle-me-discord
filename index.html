<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Click Me</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    img {
      max-width: 100%;
      height: auto;
      cursor: pointer;
      display: block;
    }
  </style>
</head>

<body>

  <!-- 🔊 Auto-play soundbite -->
  <audio id="sound" src="ezekiel-25-17_pulpfiction.mp3"></audio>

  <a href="https://discord.gg/grkAwQ9W">
    <img src="Click_I_Dare.jpg" alt="Click on me, I dare you">
  </a>

  <script>
    window.onload = () => {
      const audio = document.getElementById("sound");
      audio.volume = 1.0;

      audio.play().catch(() => {
        // If browser blocks autoplay, play on first click
        document.body.addEventListener("click", () => audio.play(), { once: true });
      });
    };
  </script>

</body>
</html>
